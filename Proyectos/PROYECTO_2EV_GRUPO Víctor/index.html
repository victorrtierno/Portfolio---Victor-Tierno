<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Festival - Acceso</title>
    <link rel="stylesheet" href="styles/styles.css" />
  </head>

  <body class="pantalla-inicio">
    
    <div class="cinta-noticias">
      <div class="cinta-texto">
        PU7O PERREO 2026 • ABONOS YA A LA VENTA • PU7O PERREO 2026 • ABONOS YA A LA VENTA • PU7O PERREO 2026 • ABONOS YA A LA VENTA • PU7O PERREO 2026 • ABONOS YA A LA VENTA • 
      </div>
    </div>

    <video autoplay muted loop class="video-fondo">
        <source src="img/festival.mp4" type="video/mp4" />
        Tu navegador no soporta vídeos HTML5.
    </video>

    <h1 class="titulo-festival">PU7O PERREO</h1>

    <div class="contenedor-inicio">
      <h2>Inicio de sesión</h2>
      
      <form id="formulario-acceso" class="caja-formulario" action="#" method="POST">
        <input type="text" id="usuario" name="usuario" placeholder="Nombre de usuario" required />
        <input type="password" id="clave" name="clave" placeholder="Contraseña" required />
        <button type="submit" id="boton-entrar">Entrar</button>
      </form>
    </div>

    <script src="script/script.js"></script>
  </body>
</html>
